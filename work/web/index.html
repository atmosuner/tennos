  const rowEl=$('#matches-card');
  app().insertBefore(aiCard, rowEl);
}

const AI_PROXY_URL='https://kortex-groq.bahadiruner82.workers.dev';
async function analyzeWithGemini(){
  const btn=document.getElementById('ai-analyze-btn');
  const res=document.getElementById('ai-result');
  btn.disabled=true; btn.textContent='Değerlendiriliyor…';
  res.innerHTML='<p class="muted">Groq yanıt veriyor…</p>';
  try{
    const resp=await fetch(AI_PROXY_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({prompt:window._currentAiPrompt})
    });
    if(!resp.ok){const err=await resp.json().catch(()=>({}));throw new Error(err.error?.message||resp.statusText);}
    const data=await resp.json();
    const text=data.choices?.[0]?.message?.content||'Yanıt alınamadı.';
    try{ localStorage.setItem('ai_analysis_'+window._currentPlayerId, JSON.stringify({ts:Date.now(),response:text})); }catch(e){}
    window._lastAiResponse=text;
    res.innerHTML=renderAiResponse(text);
    // update header date
    const meta=document.querySelector('#ai-analyze-btn')?.closest('.card')?.querySelector('h2 .tag');
    if(meta) meta.textContent=new Date().toLocaleDateString('tr-TR',{day:'numeric',month:'short',year:'numeric'});
    else{ const h2=document.querySelector('#ai-analyze-btn')?.closest('.card')?.querySelector('h2'); if(h2){ const sp=document.createElement('span'); sp.className='tag'; sp.style.marginLeft='8px'; sp.textContent=new Date().toLocaleDateString('tr-TR',{day:'numeric',month:'short',year:'numeric'}); h2.appendChild(sp); } }
  }catch(e){
    res.innerHTML=`<p class="muted" style="color:var(--loss)">Hata: ${esc(e.message)}</p>`;
  }finally{
    btn.disabled=false; btn.textContent='Yenile';
  }
}

function renderAiResponse(text){
  window._lastAiResponse=text;
  const html=text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/^### (.+)$/gm,'<h4 style="margin:12px 0 4px;color:var(--accent-ink)">$1</h4>')
    .replace(/^## (.+)$/gm,'<h3 style="margin:14px 0 6px;color:var(--txt)">$1</h3>')
    .replace(/^# (.+)$/gm,'<h2 style="margin:16px 0 8px">$1</h2>')
    .replace(/^- (.+)$/gm,'<li style="margin:2px 0">$1</li>')
    .replace(/\n/g,'<br>');
  return `<div style="display:flex;justify-content:flex-end;margin-bottom:6px"><button id="ai-copy-btn" onclick="copyAiResponse(this)" style="background:var(--panel2);border:1px solid var(--line);padding:5px 12px;border-radius:8px;font-size:12px;cursor:pointer;color:var(--dim)">Kopyala</button></div><div style="background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:16px;font-size:14px;line-height:1.75;color:var(--txt)">${html}</div>`;
}

function copyAiResponse(btn){
  const txt=window._lastAiResponse||'';
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(()=>{btn.textContent='Kopyalandı ✓';setTimeout(()=>btn.textContent='Kopyala',2000);}).catch(()=>fallbackCopy(txt,btn));
  } else { fallbackCopy(txt,btn); }
}
function fallbackCopy(txt,btn){
  const ta=document.createElement('textarea');
  ta.value=txt; ta.style.cssText='position:fixed;opacity:0';
  document.body.appendChild(ta); ta.select();
  try{document.execCommand('copy');btn.textContent='Kopyalandı ✓';setTimeout(()=>btn.textContent='Kopyala',2000);}
  catch(e){btn.textContent='Hata';}
  document.body.removeChild(ta);
}

function buildAiPrompt(id,d,byYear,recentForForm){
  const r=d.rating, b=d.player;
  const name=(r&&r.name)||(b&&b.name)||('#'+id);
  const birthYear=b&&b.birth_year?b.birth_year:null;
  const currentYear=new Date().getFullYear();
  const age=birthYear?`${currentYear-birthYear} yaşında (${birthYear} doğumlu)`:'';
  const gender=b&&b.gender?b.gender:'';
  const club=r&&r.club_name?r.club_name:(b&&b.club_name)||'';
  const city=b&&b.city?b.city:'';
  const elo=r?Math.round(r.rating):null;
  const peak=r?Math.round(r.peak_rating):null;
  const firstRating=d.ratingHistory&&d.ratingHistory.length?Math.round(d.ratingHistory[0].rating_after):null;
  const wins=r?r.wins:0, losses=r?r.losses:0;
  const total=wins+losses;
  const pct=total?Math.round(wins/total*100):0;
  const ageGroup=r&&r.age_group?r.age_group:'';
  const overallRank=r?r.overall_rank:null;
  const genderRank=r&&r.gender_rank?r.gender_rank:null;
  const agRank=r&&r.age_group_rank?r.age_group_rank:null;

  // rating trend
  const ratingTrend=elo&&firstRating?(elo>firstRating?`+${elo-firstRating} artış`:`${elo-firstRating} düşüş`):'';
  const peakDiff=elo&&peak&&peak>elo?`(zirveden ${peak-elo} puan düşük)`:'';
  const hist=d.ratingHistory||[];
  const last10hist=hist.slice(-10).map(h=>Math.round(h.rating_after));
  const last5hist=hist.slice(-5).map(h=>Math.round(h.rating_after));
  const recentDelta5=last5hist.length>=2?last5hist[last5hist.length-1]-last5hist[0]:null;
  const recentDelta10=last10hist.length>=2?last10hist[last10hist.length-1]-last10hist[0]:null;
  const ratingSnapshots=hist.length>=4?[
    {label:'İlk maç',v:Math.round(hist[0].rating_after)},
    {label:'%25',v:Math.round(hist[Math.floor(hist.length*0.25)].rating_after)},
    {label:'%50',v:Math.round(hist[Math.floor(hist.length*0.50)].rating_after)},
    {label:'%75',v:Math.round(hist[Math.floor(hist.length*0.75)].rating_after)},
    {label:'Son maç',v:elo},
  ]:[];
  const ratingProgressLine=ratingSnapshots.map(s=>`${s.label}: ${s.v}`).join(' → ');
  const recentTrendLine=[
    last10hist.length>=2?`Son 10 maç: ${recentDelta10>=0?'+':''}${recentDelta10} puan (${last10hist.join(' → ')})`:'',
    last5hist.length>=2?`Son 5 maç: ${recentDelta5>=0?'+':''}${recentDelta5} puan (${last5hist.join(' → ')})`:'',
  ].filter(Boolean).join('\n  ');

  // form band: last 30, sequence string
  const formSeq=(recentForForm||[]).map(m=>{
    if(m.resultType==='walkover') return m.won?'WO↑':'WO↓';
    if(m.resultType==='retirement') return m.won?'Ret↑':'Ret↓';
    return m.won?'G':'M';
  }).join(' ');
  const last30=recentForForm||[];
  const formWins=last30.filter(m=>m.won&&m.resultType==='completed').length;
  const formLosses=last30.filter(m=>!m.won&&m.resultType==='completed').length;

  // yearly breakdown
  const yearlyLines=byYear?Object.entries(byYear).sort(([a],[b])=>a-b).map(([y,v])=>{
    const tot=v.w+v.l; const p=Math.round(v.w/tot*100);
    return `  ${y}: ${v.w}G / ${v.l}M (%${p})`;
  }).join('\n'):'  Veri yok';

  // age group distribution
  const agDist={};
  (d.recentMatches||[]).forEach(m=>{if(m.ageGroup)(agDist[m.ageGroup]=agDist[m.ageGroup]||{w:0,l:0})[m.won?'w':'l']++;});
  const agLines=Object.entries(agDist).sort(([a],[b])=>a-b).map(([ag,v])=>`  ${ag} Yaş: ${v.w}G / ${v.l}M`).join('\n')||'  Veri yok';

  // last 20 completed matches detail
  const last20=d.recentMatches.filter(m=>m.resultType==='completed').slice(0,20).map((m,i)=>{
    const res=m.won?'G':'M';
    const oppRtg=m.opponentRating?` (rakip reyting: ${m.opponentRating})`:'';
    return `  ${i+1}. ${res} · ${m.opponentName||'?'}${oppRtg} · ${m.score||'?'} · ${m.stage||'?'} · ${m.event||'?'} · ${m.date||'?'}`;
  }).join('\n');

  // walkover / retirement stats
  const woWin=d.recentMatches.filter(m=>m.resultType==='walkover'&&m.won).length;
  const woLoss=d.recentMatches.filter(m=>m.resultType==='walkover'&&!m.won).length;
  const retWin=d.recentMatches.filter(m=>m.resultType==='retirement'&&m.won).length;
  const retLoss=d.recentMatches.filter(m=>m.resultType==='retirement'&&!m.won).length;

  // opponent rating analysis (completed matches with rating data)
  const ratedMatches=d.recentMatches.filter(m=>m.resultType==='completed'&&m.opponentRating);
  const playerElo=elo||1200;
  // higher/lower rated totals + win/loss breakdown
  const higherRated=ratedMatches.filter(m=>m.opponentRating>playerElo+50);
  const lowerRated=ratedMatches.filter(m=>m.opponentRating<playerElo-50);
  const upsetWins=higherRated.filter(m=>m.won).sort((a,b)=>b.opponentRating-a.opponentRating);
  const upsetLosses=lowerRated.filter(m=>!m.won).sort((a,b)=>a.opponentRating-b.opponentRating);
  const avgOppWin=ratedMatches.filter(m=>m.won).length?Math.round(ratedMatches.filter(m=>m.won).reduce((s,m)=>s+m.opponentRating,0)/ratedMatches.filter(m=>m.won).length):null;
  const avgOppLoss=ratedMatches.filter(m=>!m.won).length?Math.round(ratedMatches.filter(m=>!m.won).reduce((s,m)=>s+m.opponentRating,0)/ratedMatches.filter(m=>!m.won).length):null;
  const bestWin=upsetWins.length?upsetWins[0]:ratedMatches.filter(m=>m.won).sort((a,b)=>b.opponentRating-a.opponentRating)[0]||null;
  const worstLoss=upsetLosses.length?upsetLosses[0]:null;
  const oppRatingLines=`  Galibiyetlerde ort. rakip reytingi: ${avgOppWin||'—'}
  Mağlubiyetlerde ort. rakip reytingi: ${avgOppLoss||'—'}
  Üst sıradaki rakiplere karşı (rakip >${playerElo+50}): toplam ${higherRated.length} maç → ${upsetWins.length}G / ${higherRated.length-upsetWins.length}M
  Alt sıradaki rakiplere karşı (rakip <${playerElo-50}): toplam ${lowerRated.length} maç → ${lowerRated.length-upsetLosses.length}G / ${upsetLosses.length}M${bestWin?`\n  En değerli galibiyet: ${bestWin.opponentName} (reyting: ${bestWin.opponentRating}) — ${bestWin.score}, ${bestWin.date}`:''}${worstLoss?`\n  En sürpriz mağlubiyet: ${worstLoss.opponentName} (reyting: ${worstLoss.opponentRating}) — ${worstLoss.score}, ${worstLoss.date}`:''}`;

  // Elo loss context: losses within last 20 completed matches (not last 20 losses)
  const last20completed=d.recentMatches.filter(m=>m.resultType==='completed').slice(0,20);
  const recentLosses20=last20completed.filter(m=>!m.won&&m.opponentRating);
  const expectedLosses=recentLosses20.filter(m=>m.opponentRating>playerElo+50);
  const unexpectedLosses=recentLosses20.filter(m=>m.opponentRating<playerElo-50);
  const eloLossContext=recentLosses20.length?
    `  Son 20 tamamlanan maçtaki mağlubiyetler (${recentLosses20.length} adet):\n`+
    `  - Beklenen (rakip >${playerElo+50}): ${expectedLosses.length} maç${expectedLosses.length?` — ${expectedLosses.map(m=>`${m.opponentName}(${m.opponentRating})`).join(', ')}`:''}\n`+
    `  - Sürpriz (rakip <${playerElo-50}): ${unexpectedLosses.length} maç${unexpectedLosses.length?` — ${unexpectedLosses.map(m=>`${m.opponentName}(${m.opponentRating})`).join(', ')}`:''}\n`+
    `  - Yakın seviye (±50): ${recentLosses20.length-expectedLosses.length-unexpectedLosses.length} maç`
    :'  Son 20 tamamlanan maçta reyting verisi olan mağlubiyet yok';

  // Score quality analysis — score is player-oriented: set.a=player, set.b=opponent
  function parseSets(scoreStr){
    if(!scoreStr) return [];
    return scoreStr.trim().split(/\s+/).map(s=>{const p=s.split('-');return p.length===2?{a:+p[0],b:+p[1]}:null;}).filter(Boolean);
  }
  const completedWithScore=d.recentMatches.filter(m=>m.resultType==='completed'&&m.score);
  const threeSetMatches=completedWithScore.filter(m=>parseSets(m.score).length>=3);
  const mtbMatches=threeSetMatches.filter(m=>{const s=parseSets(m.score);const last=s[s.length-1];return last&&Math.max(last.a,last.b)>=8;});
  const threeSetW=threeSetMatches.filter(m=>m.won).length, threeSetL=threeSetMatches.filter(m=>!m.won).length;
  const mtbW=mtbMatches.filter(m=>m.won).length, mtbL=mtbMatches.filter(m=>!m.won).length;
  // dominant: straight sets, every set won by ≥2 (set.a=player score)
  const dominantWins=completedWithScore.filter(m=>{
    if(!m.won) return false;
    const s=parseSets(m.score); if(s.length!==2) return false;
    return s.every(set=>set.a>set.b&&(set.a-set.b)>=3);
  });
  const closeWins=completedWithScore.filter(m=>{
    if(!m.won) return false;
    const s=parseSets(m.score); if(!s.length) return false;
    if(s.length>=3) return true;
    return s.some(set=>Math.abs(set.a-set.b)<=1);
  });
  const dominantLosses=completedWithScore.filter(m=>{
    if(m.won) return false;
    const s=parseSets(m.score); if(s.length!==2) return false;
    return s.every(set=>set.b>set.a&&(set.b-set.a)>=3);
  });
  const scoreQualityLines=
    `  Toplam tamamlanan (skor verisi olan): ${completedWithScore.length} maç\n`+
    `  3. set / MTB'ye giden: ${threeSetMatches.length} maç → ${threeSetW}G / ${threeSetL}M\n`+
    `  Match Tie-Break rekoru: ${mtbW}G / ${mtbL}M (toplam ${mtbMatches.length} MTB)\n`+
    `  Dominant galibiyet (düz setler, ≥2 set farkı): ${dominantWins.length}\n`+
    `  Yakın galibiyet (3. set veya ≤1 fark): ${closeWins.length}\n`+
    `  Dominant mağlubiyet (düz setler, her iki sette oyun farkı ≥3): ${dominantLosses.length}`;

  return `Sen kıdemli bir Türk junior tenis analistisin. Aşağıdaki veriye bakıp KISA, DÜRÜST, nokta-atışı bir değerlendirme yaz. Övgü, dolgu cümle, klişe yok. Aynı sayıyı/bulguyu iki kez kullanma. Yalnızca aşağıdaki veriden konuş; teknik/oyun stili (forehand, servis, agresif/defansif vb.) verisi yok, onlara girme. Veri yoksa kısaca "veri yok" de, uydurma. Toplam ~350 kelimeyi geçme.

- Kısa vade trendi:
  ${recentTrendLine||'Yeterli veri yok'}

## ÖNEMLİ MANTIK NOTLARI (uy, ama tekrar etme)
- "%100 kazanma + güçlü rakip (>kendi Elo'su) yok" ise: bunun anlamı tavanın EKSİK değil, ÖLÇÜLMEMİŞ olmasıdır. "Tavan performans eksikliği" deme; "tavan henüz test edilmedi" de.
- MTB / karar seti galibiyet oranı yüksekse "mental zayıf" deme.
- Hiç anlamlı mağlubiyet yoksa istikrar zaten kanıtlı; uzun uzun övme, bir kez söyle geç.
- Skor/sonuç verisinden oyun stili çıkmaz; çıkarsama yapma.

## ÇIKTI FORMATI (tam olarak bu başlıklar, bu sıra, kısa tut)

**Hüküm**
1-2 cümle: oyuncu bugün nerede + önündeki tek en büyük fırsat.

**Seviye**
Tek etiket seç (İl düzeyi / Bölgesel güçlü / Ulusal rekabetçi / Ulusal üst düzey / Milli takım adayı) + tek cümle gerekçe (sıralama + rakip Elo bandı ile).

**3 Net Tespit**
Veriden çıkan en çarpıcı 3 bulgu. Her biri tek satır, şu formatta:
- Kanıt → Sonuç
(Sıradan/beklenen şeyleri yazma; sadece dikkat çekici olanı.)

**Sınırlayıcı & Avantaj**
- En kritik sınırlayıcı: tek cümle + sayı.
- En büyük avantaj: tek cümle + sayı.

**6 Ay – Aksiyon**
3 madde, her biri somut ve ölçülebilir (örn. "kendi Elo'sunun +100 üstü rakiplerle en az 8 maç", "1700+ rakibe karşı set kaybı oranını ölç"). Tahmin/övgü değil, eylem.

**Aileye**
2 cümle, teknik olmayan sade dil: bugün nerede + 6 ayda neye odaklanılmalı.

Kurallar: Toplam ~350 kelime. Markdown başlıklar bold. Madde madde yaz, paragraf şişirme. Aynı sayıyı birden çok bölümde tekrarlama. Güven düşükse "(güven: düşük)" ekle.`;
}

// ---------- H2H ----------
async function h2h(a,b){
  app().innerHTML='<div class="loading">yükleniyor…</div>';
  const d=await api(`/h2h/${a}/${b}`);
  const list=d.matches.map(m=>`
    <div class="matchline">
      <span class="badge ${m.aWon?'W':'L'}">${m.aWon?d.a.name.split(' ')[0]:d.b.name.split(' ')[0]}</span>
      <span class="score">${esc(m.score)}</span>
      <span style="margin-left:auto;text-align:right" class="tag">${esc(m.event||'')} ${m.stage?'· '+esc(m.stage):''}<br>${m.tournamentId?`<a href="#/tournament/${m.tournamentId}">${esc(m.tournamentName||'turnuva')}</a> · `:''}${esc(m.date||'')}</span>
    </div>`).join('')||'<p class="muted">Hiç karşılaşmamışlar.</p>';
  app().innerHTML=`
    <h1>Head-to-Head</h1>
    <div class="vs">
      <div class="n"><a href="#/player/${d.a.playerId}" style="color:inherit">${esc(d.a.name)}</a></div>
      <div class="vsmid"><span class="c">${d.a.wins}</span><span class="vsdash">–</span><span class="c vslo">${d.b.wins}</span></div>
      <div class="n vsb"><a href="#/player/${d.b.playerId}" style="color:inherit">${esc(d.b.name)}</a></div>
    </div>
    <p class="sub" style="text-align:center">${d.total} karşılaşma</p>
    <div style="max-width:560px;margin:0 auto">${list}</div>`;
}

// ---------- Clubs ----------
async function clubs(){
  app().innerHTML=`<div style="font-family:var(--font-mono);font-size:11.5px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--accent-ink);margin-bottom:4px">KULÜP DİZİNİ</div>
    <h1 style="margin:0 0 16px">Kulüpler</h1>
    <input id="cq" placeholder="kulüp ara…" style="width:100%;background:var(--panel);border:1px solid var(--line);color:var(--txt);padding:11px 14px;border-radius:10px;font-size:15px;outline:none;margin-bottom:16px;box-sizing:border-box">
    <div id="cl" class="loading">…</div>`;
  const load=async term=>{const d=await api('/clubs'+qs({q:term||'',limit:200}));
    $('#cl').outerHTML=`<div id="cl"><div class="club-grid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:13px">
      ${d.clubs.map(c=>{const tot=c.total_wins+c.total_losses,pct=tot?Math.round(c.total_wins/tot*100):null;
        return`<div class="card" style="cursor:pointer;padding:16px 18px" onclick="location.hash='#/rankings?club_id=${c.club_id}'">
        <div style="font-weight:700;letter-spacing:-.01em;font-size:16px">${esc(c.name)}</div>
        <div style="color:var(--dim);font-size:12px;margin-top:2px;margin-bottom:14px">${esc(c.city||'—')}</div>
        <div style="display:flex;gap:18px;flex-wrap:wrap">
          <div><div style="font-family:var(--font-mono);font-size:18px;font-weight:700;color:var(--accent-ink)">${c.player_count}</div><div style="font-size:10.5px;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;font-weight:700">Oyuncu</div></div>
          <div><div style="font-family:var(--font-mono);font-size:18px;font-weight:700;color:var(--accent-ink)">${c.avg_rating!=null?c.avg_rating:'—'}</div><div style="font-size:10.5px;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;font-weight:700">Ort. Elo</div></div>
          <div><div style="font-family:var(--font-mono);font-size:18px;font-weight:700;color:var(--txt)">${tot?`<span class="w">${c.total_wins}</span>/<span class="l">${c.total_losses}</span>`:'—'}</div><div style="font-size:10.5px;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;font-weight:700">G/M</div></div>
          <div><div style="font-family:var(--font-mono);font-size:18px;font-weight:700;color:var(--gold)">${pct!=null?pct+'%':'—'}</div><div style="font-size:10.5px;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;font-weight:700">G%</div></div>
        </div>
      </div>`;}).join('')}
      </div></div>`;};
  $('#cq').oninput=e=>load(e.target.value);
  load('');
}

// ---------- Players directory ----------
async function players_dir(params){
  const gn=params.gender||'', by=params.birth_year||'', term=params.q||'', ag=params.age_group||'';
  const cid=params.club_id||'', cn=params.club_name||'';
  const page=Math.max(1,parseInt(params.page||'1')), limit=50, offset=(page-1)*limit;
  app().innerHTML=`<div style="font-family:var(--font-mono);font-size:11.5px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--accent-ink);margin-bottom:4px">OYUNCU DİZİNİ</div>
    <h1 style="margin:0 0 16px">Oyuncular</h1>
    <div class="filters">
      <input id="pQ" value="${esc(term)}" placeholder="oyuncu ara…" style="background:var(--panel);border:1px solid var(--line);color:var(--txt);padding:10px 14px;border-radius:10px;outline:none;font-size:15px;flex:1;min-width:160px">
      <select id="pGen"><option value="">Tüm Cinsiyet</option><option value="Erkek" ${gn=='Erkek'?'selected':''}>Erkek</option><option value="Kadın" ${gn=='Kadın'?'selected':''}>Kadın</option></select>
      <select id="pYear"><option value="">Tüm Doğum Yılı</option></select>
      <select id="pAg"><option value="">Tüm Kategori</option></select>
      <div id="pClub" style="position:relative"></div>
    </div>
    <div id="pl" class="loading">…</div>`;
  const d=await api('/players'+qs({q:term,gender:gn,birth_year:by,age_group:ag,club_id:cid,limit,offset}));
  $('#pYear').innerHTML='<option value="">Tüm Doğum Yılı</option>'+d.years.map(y=>`<option value="${y}" ${y==by?'selected':''}>${y}</option>`).join('');
  $('#pAg').innerHTML='<option value="">Tüm Kategori</option>'+(d.age_groups||[]).map(a=>`<option value="${a}" ${a==ag?'selected':''}>${a} Yaş</option>`).join('');
  const nav=()=>location.hash='#/players'+qs({q:$('#pQ').value,gender:$('#pGen').value,birth_year:$('#pYear').value,age_group:$('#pAg').value,club_id:cid,club_name:cn});
  $('#pGen').onchange=nav; $('#pYear').onchange=nav; $('#pAg').onchange=nav;
  let t;$('#pQ').oninput=e=>{clearTimeout(t);t=setTimeout(nav,350);};
  // club picker
  const pClub=$('#pClub');
  const renderClubPicker=()=>{
    if(cid&&cn){
      pClub.innerHTML=`<div class="picked" style="white-space:nowrap"><b>${esc(cn)}</b><span class="x" title="kaldır" style="cursor:pointer;margin-left:6px">✕</span></div>`;
      pClub.querySelector('.x').onclick=()=>{location.hash='#/players'+qs({q:$('#pQ').value,gender:$('#pGen').value,birth_year:$('#pYear').value});};
    } else {
      pClub.innerHTML=`<div class="picker"><input placeholder="kulüp ara…" autocomplete="off" style="background:var(--panel);border:1px solid var(--line);color:var(--txt);padding:10px 14px;border-radius:10px;outline:none;font-size:15px"><div class="results"></div></div>`;
      const inp=pClub.querySelector('input'),res=pClub.querySelector('.results');
      let tc;inp.oninput=()=>{clearTimeout(tc);const v=inp.value.trim();
        if(v.length<2){res.classList.remove('show');return;}
        tc=setTimeout(async()=>{const s=await api('/search'+qs({q:v}));
          res.innerHTML=s.clubs.length?s.clubs.map(c=>`<div class="r" data-id="${c.club_id}" data-name="${esc(c.name)}">${esc(c.name)}<span class="muted" style="margin-left:6px;font-size:12px">${esc(c.city||'')}</span></div>`).join(''):'<div class="r muted">sonuç yok</div>';
          res.classList.add('show');
          res.querySelectorAll('.r[data-id]').forEach(el=>el.onclick=()=>{
            location.hash='#/players'+qs({q:$('#pQ').value,gender:$('#pGen').value,birth_year:$('#pYear').value,club_id:el.dataset.id,club_name:el.dataset.name});
          });
        },200);
      };
      inp.onblur=()=>setTimeout(()=>res.classList.remove('show'),200);
    }
  };
  renderClubPicker();
  const pages=Math.ceil(d.total/limit);
  const pager=(()=>{
    const mk=(p,lbl,dis)=>dis?`<span class="btn" style="opacity:.4">${lbl}</span>`:`<a class="btn" href="#/players${qs({q:term,gender:gn,birth_year:by,age_group:ag,club_id:cid,club_name:cn,page:p})}">${lbl}</a>`;
    return `<div class="flex" style="margin:14px 0;justify-content:center;gap:12px">
      ${mk(page-1,'‹ Önceki',page<=1)}<span class="muted">${page} / ${pages||1}</span>${mk(page+1,'Sonraki ›',page>=pages)}</div>`;})();
  $('#pl').outerHTML=`<div id="pl"><p class="muted" style="margin:0 0 10px">${d.total.toLocaleString('tr')} oyuncu</p>
    <table><thead><tr><th></th><th onclick="sortTable(this)" style="cursor:pointer">Oyuncu</th><th onclick="sortTable(this)" style="cursor:pointer">Doğum</th><th onclick="sortTable(this)" style="cursor:pointer">Kategori</th><th onclick="sortTable(this)" style="cursor:pointer">Cinsiyet</th><th onclick="sortTable(this)" style="cursor:pointer">Kulüp</th><th onclick="sortTable(this)" style="cursor:pointer">Şehir</th><th onclick="sortTable(this)" style="cursor:pointer">Reyting</th></tr></thead><tbody>
    ${d.players.map(p=>{const inSlot=cmpSlots.some(s=>s&&s.id===String(p.player_id));return`<tr>
      <td style="padding:0 4px"><button class="cmp-btn ${inSlot?'in-slot':''}" data-pid="${p.player_id}" data-name="${esc(p.name)}" onclick="addToCmp(this.dataset.pid,this.dataset.name)" title="Karşılaştırmaya ekle">${inSlot?'✓':'⇄'}</button></td>
      <td><a href="#/player/${p.player_id}">${esc(p.name)}</a></td>
      <td class="muted">${p.birth_year||'—'}</td>
      <td>${ageP(p.age_group)}</td>
      <td>${genderP(p.gender)}</td>
      <td class="muted">${esc(p.club_name||'')}</td>
      <td class="muted">${esc(p.city||'')}</td>
      <td class="${p.rating?'rating':'muted'}">${p.rating?Math.round(p.rating):'—'}</td></tr>`;}).join('')}
    </tbody></table>${pager}</div>`;
}

async function tournament(id){
  app().innerHTML='<div class="loading">yükleniyor…</div>';
  const d=await api('/tournament/'+id);
  if(d.error){app().innerHTML='<p class="muted">Turnuva bulunamadı.</p>';return;}
  const t=d.tournament, cl=d.club;
  const metaPairs=[['Tarih',esc((t.start_date||'').replace(/\s*\(\d+\)/,''))],['Şehir',esc(t.city||'—')],
    cl?['Kulüp',esc(cl.name)]:null,t.type_text?['Tür',esc(t.type_text)]:null,
    t.surface?['Yüzey',esc(t.surface)]:null,t.court_type?['Kort',esc(t.court_type)]:null].filter(Boolean);
  const metaGrid=`<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1px;background:var(--line);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;margin-bottom:16px">
    ${metaPairs.map(([k,v])=>`<div style="background:var(--panel);padding:14px 16px">
      <div style="font-size:10.5px;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;font-weight:700;margin-bottom:4px">${k}</div>
      <div style="font-weight:600;font-size:13.5px">${v}</div></div>`).join('')}
    </div>`;
  const cats=d.categories.map(c=>`<div class="card" style="cursor:pointer" onclick="window.tfilter('${esc(c.event).replace(/'/g,'')}')">
      <div class="flex">${ageP(c.age_group)}${genderP(c.gender)}</div>
      <div style="margin:6px 0 2px;font-weight:600">${esc(c.event)}</div>
      <div class="tag">${c.n} maç${c.championName?` · 🏆 ${esc(c.championName)}`:''}</div>
    </div>`).join('');
  window._tmatches=d.matches;
  const dateKey=s=>{const m=/(\d{2})\.(\d{2})\.(\d{4})/.exec(s||'');return m?m[3]+m[2]+m[1]:'99999999';};
  const days=[];const dseen={};
  d.matches.forEach(m=>{if(!m.date||dseen[m.date])return;dseen[m.date]=1;days.push({date:m.date,dayName:m.dayName});});
  days.sort((a,b)=>dateKey(a.date)<dateKey(b.date)?-1:1);
  window._tdays=days; window._tday=days[0]?days[0].date:'';
  app().innerHTML=`
    <a href="#/tournaments" class="tag">← Turnuvalar</a>
    <div style="font-family:var(--font-mono);font-size:11.5px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--accent-ink);margin:8px 0 4px">TURNUVA${t.year?' · '+t.year:''}</div>
    <h1 style="margin:0 0 16px">${esc(t.name)}</h1>
    ${metaGrid}
    <h2>Kategoriler ${d.matches.length?`· ${d.matches.length} maç`:''}</h2>
    <div class="cards">${cats||'<p class="muted">maç verisi yok</p>'}</div>
    <h2>Maç Programı</h2>
    <div class="filters"><select id="tmCat"><option value="">Tüm Kategoriler</option>
      ${[...new Set(d.matches.map(m=>m.event))].filter(Boolean).map(e=>`<option value="${esc(e)}">${esc(e)}</option>`).join('')}
    </select><select id="tmStage"><option value="">Tüm Aşamalar</option>
      ${[...new Set(d.matches.map(m=>m.stage))].filter(Boolean).map(s=>`<option value="${esc(s)}">${esc(s)}</option>`).join('')}
    </select></div>
    <div id="tmdays" style="display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:14px"></div>
    <div id="tmlist"></div>`;
  $('#tmCat').onchange=renderTMatches; $('#tmStage').onchange=renderTMatches;
  window.tfilter=ev=>{$('#tmCat').value=ev;renderTMatches();$('#tmlist').scrollIntoView({behavior:'smooth'});};
  renderTDays(); renderTMatches();
}
function renderTDays(){
  $('#tmdays').innerHTML=window._tdays.map(dy=>`<button type="button" onclick="window.tsetday('${esc(dy.date)}')"
    style="flex:0 0 auto;padding:8px 14px;border-radius:10px;border:1px solid ${dy.date===window._tday?'var(--accent)':'var(--line)'};
    background:${dy.date===window._tday?'var(--accent-soft)':'var(--panel)'};color:${dy.date===window._tday?'var(--accent-ink)':'var(--txt2)'};
    font-weight:700;font-size:12.5px;cursor:pointer;white-space:nowrap;text-align:center">
    ${esc(dy.dayName||'')}<br><span style="font-family:var(--font-mono);font-weight:600;font-size:11px">${esc(dy.date)}</span></button>`).join('');
}
window.tsetday=date=>{window._tday=date;renderTDays();renderTMatches();};
function setCell(m,side){
  if(!m.sets||!m.sets.length) return esc(m.score||'');
  return m.sets.map(s=>{
    const g=side==='w'?s.w:s.l, tb=side==='w'?s.tw:s.tl;
    return `<span style="position:relative;display:inline-block;min-width:14px;text-align:center">${g==null?'-':g}${tb!=null?`<sup style="font-size:8px;font-weight:600;position:absolute;top:-3px;left:100%">${tb}</sup>`:''}</span>`;
  }).join('');
}
function renderTMatches(){
  const cat=$('#tmCat').value, stg=$('#tmStage').value, day=window._tday;
  let ms=window._tmatches.filter(m=>m.date===day&&(!cat||m.event===cat)&&(!stg||m.stage===stg));
  const courts=[],cidx={};
  ms.forEach(m=>{const k=m.court||'Kort';if(!(k in cidx)){cidx[k]=courts.length;courts.push({court:k,items:[]});}courts[cidx[k]].items.push(m);});
  courts.forEach(c=>c.items.sort((a,b)=>(a.startTime||'99:99')<(b.startTime||'99:99')?-1:1));
  $('#tmlist').innerHTML=`<p class="muted" style="margin:0 0 12px">${ms.length} maç</p>`+
    (courts.length?`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px">
      ${courts.map(c=>`<div>
        <h3 style="margin:0 0 10px;font-size:14px;color:var(--accent-ink)">${esc(c.court)}</h3>
        ${c.items.map(m=>`<div class="card" style="padding:10px 12px;margin-bottom:8px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;gap:6px">

function setClubSlot(slot,id,name){
  const q=parseQ((location.hash.split('?')[1])||'');
  if(slot==='a'){q.a=id;q.an=name;}else{q.b=id;q.bn=name;}
  if(!id){delete q[slot==='a'?'a':'b'];delete q[slot==='a'?'an':'bn'];}
  location.hash='#/compare-clubs'+qs(q);
}

async function renderClubSlot(slot,id,name){
  const el=$('#clubSlot'+slot.toUpperCase());
  if(id&&name){
    el.innerHTML=`<div class="picked"><b>${esc(name)}</b><span class="x" title="kaldır">✕</span></div>`;
    el.querySelector('.x').onclick=()=>setClubSlot(slot,'','');
    return;
  }

  const inp=el.querySelector('input'), res=el.querySelector('.results');

      res.innerHTML=d.clubs.length?d.clubs.map(c=>`<div class="r" data-id="${c.club_id}" data-name="${esc(c.name)}">${esc(c.name)}<span class="muted" style="margin-left:6px;font-size:12px">${esc(c.city||'')}</span></div>`).join(''):'<div class="r muted">sonuç yok</div>';

async function renderClubCompare(a,b,an,bn,gender,ag){
  const extraP={...(gender?{gender}:{}),...(ag?{age_group:ag}:{})};
  const[ra,rb,cv]=await Promise.all([
    api('/rankings'+qs({club_id:a,limit:15,...extraP})),
    api('/rankings'+qs({club_id:b,limit:15,...extraP})),
    api('/club_vs_club'+qs({club_a:a,club_b:b}))
  ]);
  const ap=ra.rankings||[], bp=rb.rankings||[];
  const avg=arr=>arr.length?Math.round(arr.reduce((s,p)=>s+(p.rating||0),0)/arr.length):0;
  const avgA=avg(ap), avgB=avg(bp);
  const bar=(va,vb)=>`<div class="bar"><i class="ia" style="width:${va+vb?va/(va+vb)*100:50}%"></i><i class="ib" style="width:${va+vb?vb/(va+vb)*100:50}%"></i></div>`;
  const cmpRow=(lbl,va,vb,inv)=>{const na=+va||0,nb=+vb||0,hiA=inv?na<nb:na>nb,hiB=inv?nb<na:nb>na;
    return `<div class="cmp"><div class="lbl">${lbl}</div><div class="va ${hiA?'win-hi':'win-lo'}">${va}</div>${bar(na,nb)}<div class="vb ${hiB?'win-hi':'win-lo'}">${vb}</div></div>`;};
  const prow=p=>`<tr><td><a href="#/player/${p.player_id}">${esc(p.name)}</a></td><td>${ageP(p.age_group)}</td><td class="rating">${Math.round(p.rating)}</td></tr>`;
  const aW=cv.aWins||0,bW=cv.bWins||0,tot=cv.total||0;
  const mkLine=(m)=>{
    const aWon=m.winner_club===+a;
    const scTxt=m.score||'W.O.';const scTip=m.fullScore||'Walkover';
    const sc=`<span class="sc-ic" title="${esc(scTip)}">${esc(scTxt)}</span>`;
    const info=[m.tournament_name,m.event,m.stage,m.match_date].filter(Boolean).join(' · ');
    const ti=info?(m.tournament_id?`<a href="#/tournament/${m.tournament_id}" class="sc-ic" title="${esc(info)}" style="font-style:italic">i</a>`:`<span class="sc-ic" title="${esc(info)}" style="font-style:italic;cursor:help">i</span>`):'';
    return `<div class="matchline">
      <span class="badge" style="background:${aWon?'var(--accent)':'var(--accent2)'};color:#fff">${esc(aWon?an.split(' ')[0]:bn.split(' ')[0])}</span>
      <span><b><a href="#/player/${m.winner_id}">${esc(m.winner_name)}</a></b> · <a href="#/player/${m.loser_id}" class="muted">${esc(m.loser_name)}</a></span>
      <span style="margin-left:auto;display:flex;gap:4px;align-items:center;flex-shrink:0">${sc}${ti}</span>
    </div>`;};
  const trendSvg=(ms)=>{
    if(ms.length<2) return '';
    const dk=s=>{const m=/(\d{1,2})[.\-\/](\d{1,2})[.\-\/](\d{4})/.exec(s||'');return m?(+m[3])*1e4+(+m[2])*100+(+m[1]):0;};
    const sorted=[...ms].sort((x,y)=>dk(x.match_date)-dk(y.match_date));
    let ca=0,cb=0;
    const pts=sorted.map(m=>{if(m.winner_club===+a)ca++;else cb++;return{d:m.match_date,ca,cb};});
    const W=860,H=190,PL=36,PR=108,PT=14,PB=26;
    const cw=W-PL-PR,ch=H-PT-PB,n=pts.length,maxV=Math.max(ca,cb,1);
    const x=i=>PL+(n>1?i/(n-1):0.5)*cw;
    const y=v=>PT+ch-(v/maxV)*ch;
    const years={};
    pts.forEach((p,i)=>{const yr=(p.d||'').slice(-4);if(yr&&!years[yr])years[yr]=i;});
    const xticks=Object.entries(years).map(([yr,i])=>
      `<line x1="${x(i).toFixed(1)}" y1="${PT}" x2="${x(i).toFixed(1)}" y2="${(PT+ch).toFixed(1)}" stroke="var(--line)" stroke-width="1" stroke-dasharray="3,3"/>` +
      `<text x="${x(i).toFixed(1)}" y="${H-5}" text-anchor="middle" font-size="11" fill="var(--dim)">${yr}</text>`
    ).join('');
    const yticks=[0,Math.round(maxV/2),maxV].map(v=>
      `<line x1="${PL}" y1="${y(v).toFixed(1)}" x2="${(W-PR).toFixed(1)}" y2="${y(v).toFixed(1)}" stroke="var(--line)" stroke-width="1"/>` +
      `<text x="${PL-4}" y="${(y(v)+4).toFixed(1)}" text-anchor="end" font-size="10" fill="var(--dim)">${v}</text>`
    ).join('');
    const ptsA=pts.map((p,i)=>`${x(i).toFixed(1)},${y(p.ca).toFixed(1)}`).join(' ');
    const ptsB=pts.map((p,i)=>`${x(i).toFixed(1)},${y(p.cb).toFixed(1)}`).join(' ');
    const ex=x(n-1),eyA=y(ca),eyB=y(cb);
    const gap=eyA-eyB,off=Math.abs(gap)<14?7:0;
    const oA=off*(gap<=0?-1:1),oB=off*(gap<=0?1:-1);
    const sA=an.split(' ')[0],sB=bn.split(' ')[0];
    return `<div style="margin:24px auto 4px;max-width:${W}px;padding:0 12px">
      <p style="text-align:center;font-size:12px;color:var(--dim);margin:0 0 6px;letter-spacing:.05em;font-weight:600">KÜMÜLATİF GALİBİYET TRENDİ</p>
      <svg width="100%" viewBox="0 0 ${W} ${H}" style="display:block;overflow:visible">
        ${yticks}${xticks}
        <polyline points="${ptsA}" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
        <polyline points="${ptsB}" fill="none" stroke="var(--accent2)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
        <circle cx="${ex.toFixed(1)}" cy="${eyA.toFixed(1)}" r="4" fill="var(--accent)"/>
        <circle cx="${ex.toFixed(1)}" cy="${eyB.toFixed(1)}" r="4" fill="var(--accent2)"/>
        <text x="${(ex+9).toFixed(1)}" y="${(eyA+4+oA).toFixed(1)}" font-size="12" font-weight="700" fill="var(--accent)">${sA} ${ca}</text>
        <text x="${(ex+9).toFixed(1)}" y="${(eyB+4+oB).toFixed(1)}" font-size="12" font-weight="700" fill="var(--accent2)">${sB} ${cb}</text>
      </svg>
    </div>`;
  };
  const baseSlots={a,b,an,bn};
  const pill=(href,lbl,active)=>`<a href="${href}" style="padding:4px 14px;border-radius:4px;font-size:13px;font-weight:${active?700:400};background:${active?'var(--accent)':'var(--panel2)'};color:${active?'#fff':'var(--fg)'};border:1px solid ${active?'var(--accent)':'var(--line)'};text-decoration:none;white-space:nowrap">${lbl}</a>`;
  const gLink=(g)=>'#/compare-clubs'+qs({...baseSlots,...(g?{gender:g}:{}),...(ag?{age_group:ag}:{})});
  const agLink=(v)=>'#/compare-clubs'+qs({...baseSlots,...(gender?{gender}:{}),...(v?{age_group:v}:{})});
  const gTabs=`<div style="display:flex;gap:6px;justify-content:center;margin-bottom:8px">${pill(gLink(''),'Tümü',gender==='')}`+
    `${pill(gLink('Erkek'),'Erkek',gender==='Erkek')}${pill(gLink('Kadın'),'Kadın',gender==='Kadın')}</div>`;
  const availAgs=[...new Set(cv.matches.map(m=>m.age_group).filter(Boolean))].sort((x,y)=>x-y);
  const agTabs=availAgs.length>1?`<div style="display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:20px">`+
    `${pill(agLink(''),'Tümü',ag==='')}${availAgs.map(v=>pill(agLink(String(v)),v+' Yaş',ag===String(v))).join('')}</div>`
    :`<div style="margin-bottom:20px"></div>`;
  const filtMs=cv.matches.filter(m=>(gender?m.match_gender===gender:true)&&(ag?String(m.age_group)===ag:true));
  const fAW=filtMs.filter(m=>m.winner_club===+a).length;
  const fBW=filtMs.filter(m=>m.winner_club===+b).length;
  const filtered=!!(gender||ag);
  const displayAW=filtered?fAW:aW, displayBW=filtered?fBW:bW, displayTot=filtered?filtMs.length:tot;
  const agFilt=m=>ag?String(m.age_group)===ag:true;
  const erkekMs=cv.matches.filter(m=>m.match_gender==='Erkek'&&agFilt(m));
  const kadinMs=cv.matches.filter(m=>m.match_gender==='Kadın'&&agFilt(m));
  const col=(ms,lbl,colr)=>`<div class="col"><h3 style="margin:0 0 10px;color:${colr};font-size:14px">${lbl} · ${ms.length}</h3>${ms.map(mkLine).join('')||'<p class="muted" style="text-align:center">kayıt yok</p>'}</div>`;
  const matchSection=gender
    ?`<div style="max-width:500px;margin:0 auto">${filtMs.map(mkLine).join('')||'<p class="muted" style="text-align:center">kayıt yok</p>'}</div>`
    :`<div class="row" style="gap:16px;max-width:900px;margin:0 auto;align-items:start">${col(erkekMs,'Erkek','#4ab0ff')}${col(kadinMs,'Kadın','#ff7ab0')}</div>`;
  $('#clubCmpOut').innerHTML=`
    ${gTabs}${agTabs}
    <div class="vs">
      <div class="n"><a href="#/rankings${qs({club_id:a,club_name:an})}" style="color:inherit">${esc(an)}</a><div style="font-family:var(--font-mono);font-size:11px;color:#7c8089;margin-top:2px;font-weight:400">${ra.total} ratingli oyuncu</div></div>
      <div class="vsmid"><span class="c">${displayAW}</span><span class="vsdash">–</span><span class="c vslo">${displayBW}</span></div>
      <div class="n vsb"><a href="#/rankings${qs({club_id:b,club_name:bn})}" style="color:inherit">${esc(bn)}</a><div style="font-family:var(--font-mono);font-size:11px;color:#7c8089;margin-top:2px;font-weight:400">${rb.total} ratingli oyuncu</div></div>
    </div>
    <div class="card" style="margin-bottom:16px">
      <div style="max-width:640px;margin:0 auto">
        ${cmpRow('Ratingli Oyuncu',ra.total,rb.total)}
        ${cmpRow('Ort. Reyting (top 15)',avgA,avgB)}
        ${displayTot?cmpRow('Toplam Maç',displayAW+'G',displayBW+'G'):''}
      </div>
      ${trendSvg(filtMs)}
    </div>
    <div class="card" style="margin-bottom:16px;padding:0">
      <h2 onclick="toggleSection('cc-players')" style="text-align:center;cursor:pointer;user-select:none;padding:16px 22px;margin:0"><span id="tog-cc-players">▶</span> Oyuncular</h2>
      <div id="cc-players" style="display:none;padding:0 22px 20px">
        <div class="row" style="gap:16px;max-width:820px;margin:0 auto;align-items:start">
          <div class="col"><p class="tag" style="text-align:center;margin-bottom:6px"><b>${esc(an)}</b></p>
            <table><thead><tr><th>Oyuncu</th><th></th><th>Reyting</th></tr></thead><tbody>${ap.map(prow).join('')||'<tr><td colspan="3" class="muted">kayıt yok</td></tr>'}</tbody></table></div>
          <div class="col"><p class="tag" style="text-align:center;margin-bottom:6px"><b>${esc(bn)}</b></p>
            <table><thead><tr><th>Oyuncu</th><th></th><th>Reyting</th></tr></thead><tbody>${bp.map(prow).join('')||'<tr><td colspan="3" class="muted">kayıt yok</td></tr>'}</tbody></table></div>
        </div>
      </div>
    </div>
    <div class="card" style="margin-bottom:16px;padding:0">
      <h2 onclick="toggleSection('cc-matches')" style="text-align:center;cursor:pointer;user-select:none;padding:16px 22px;margin:0"><span id="tog-cc-matches">▶</span> Kulüpler Arası Maçlar · ${displayTot}</h2>
      <div id="cc-matches" style="display:none;padding:0 22px 20px">
        ${matchSection}
      </div>
    </div>`;
}

      <div style="max-width:640px;margin:0 auto">
        ${row('Elo Reyting',Math.round(ra.rating||0),Math.round(rb.rating||0))}
        ${row('Zirve Elo',Math.round(ra.peak_rating||0),Math.round(rb.peak_rating||0))}
        ${row('Genel Sıra',ra.overall_rank?'#'+ra.overall_rank:'—',rb.overall_rank?'#'+rb.overall_rank:'—',true)}
        ${row('Kazanma %',pct(ra)+'%',pct(rb)+'%')}
        ${row('Galibiyet',ra.wins||0,rb.wins||0)}
        ${row('Toplam Maç',ra.matches||0,rb.matches||0)}
        <div class="cmp"><div class="va muted">${ra.age_group?ra.age_group+' Yaş':'—'}</div><div class="lbl" style="grid-column:2;margin:0">Yaş Grubu</div><div class="vb muted">${rb.age_group?rb.age_group+' Yaş':'—'}</div></div>
      </div>
    </div>
    <div class="card" style="margin-bottom:16px;padding:0">
      <details>
        <summary style="list-style:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;user-select:none;padding:16px 22px"><span style="font-weight:600">Karşılaşmalar${hh.total?' ('+hh.total+')':''}</span> <span class="toggle-arrow">▾</span></summary>
        <div style="padding:0 22px 20px"><div style="max-width:560px;margin:0 auto">${matches}</div></div>
      </details>
    </div>
    <div class="card" style="margin-bottom:16px;padding:0">${commonSection(cm,a,b)}</div>
    <div id="clubOppSection"><p class="muted" style="text-align:center">yükleniyor…</p></div>`;
  if(!clubAId&&!clubBId){document.getElementById('clubOppSection').outerHTML='';return;}
  const fetches=[];
  if(clubAId) fetches.push(api('/club_opponents'+qs({player:b,club_id:clubAId})).then(co=>({co,player:bName2,club:clubAName,clubOwner:aName,linkId:a})));
  if(clubBId) fetches.push(api('/club_opponents'+qs({player:a,club_id:clubBId})).then(co=>({co,player:aName,club:clubBName,clubOwner:bName2,linkId:b})));
  Promise.all(fetches).then(results=>{
    const el=document.getElementById('clubOppSection');
    if(!el) return;
    el.outerHTML=`<div>${results.map(r=>`<div class="card" style="margin-bottom:16px">${clubOpponentsSection(r.co,r.player,r.club,r.linkId,r.clubOwner)}</div>`).join('')}</div>`;
  });
}

function commonSection(cm,a,b){
  const an=esc(cm.a.name.split(' ')[0]), bn=esc(cm.b.name.split(' ')[0]);
  if(!cm.commonCount) return `<details><summary style="list-style:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;user-select:none;padding:16px 22px"><span style="font-weight:600">Ortak Rakipler</span> <span class="toggle-arrow">▾</span></summary><div style="padding:0 22px 20px"><p class="muted" style="text-align:center">Ortak rakip yok.</p></div></details>`;
  const aw=cm.aVsCommon, bw=cm.bVsCommon;
  const ap=aw.w+aw.l?aw.w/(aw.w+aw.l):0, bp=bw.w+bw.l?bw.w/(bw.w+bw.l):0;
  let verdict;
  if(cm.aBetter>cm.bBetter) verdict=`<b class="win-hi">${an}</b> ortak rakiplere karşı daha başarılı`;
  else if(cm.bBetter>cm.aBetter) verdict=`<b class="win-hi">${bn}</b> ortak rakiplere karşı daha başarılı`;
  else verdict=`ortak rakiplerde başa baş`;
  const mlines=(ms,name)=>ms.map(m=>`<div style="padding:6px 0;border-bottom:1px solid var(--line)">
      <div class="flex"><span class="badge ${m.won?'W':'L'}">${m.won?'G':'M'}</span><span class="score">${esc(m.score)||'<span class=muted>—</span>'}</span></div>
      <div class="tag" style="margin-top:3px">${esc(m.event||'')}${m.stage?' · '+esc(m.stage):''}<br>${m.tournamentId?`<a href="#/tournament/${m.tournamentId}">${esc(m.tournamentName||'turnuva')}</a> · `:''}${esc(m.date||'')}</div>
    </div>`).join('')||'<span class="muted tag">maç yok</span>';
  const rows=cm.common.map((c,i)=>{
    const ar=c.aW+c.aL?c.aW/(c.aW+c.aL):0, br=c.bW+c.bL?c.bW/(c.bW+c.bL):0;
    const aCol=c.aW>c.aL?'var(--win)':c.aL>c.aW?'var(--loss)':'var(--gold)';
    const bCol=c.bW>c.bL?'var(--win)':c.bL>c.bW?'var(--loss)':'var(--gold)';
    const rowBg=ar>br?'var(--win-soft)':br>ar?'var(--loss-soft)':'rgba(176,125,18,.12)';
    const main=`<tr style="cursor:pointer;background:${rowBg}" onclick="(function(e){var d=document.getElementById('cd${i}');d.style.display=d.style.display==='none'?'table-row':'none';})()">
      <td><span class="tag">▸</span> <a href="#/player/${c.opponentId}" onclick="event.stopPropagation()">${esc(c.name)}</a></td>
      <td style="text-align:center;font-weight:700;color:${aCol}">${c.aW}-${c.aL}</td>
      <td style="text-align:center;font-weight:700;color:${bCol}">${c.bW}-${c.bL}</td>
      <td style="text-align:center">${ar>br?'◀ '+an:br>ar?bn+' ▶':'='}</td></tr>`;
    const detail=`<tr id="cd${i}" style="display:none"><td colspan="4" style="background:var(--panel2)">
      <div class="row" style="gap:24px">
        <div class="col"><div class="tag" style="margin-bottom:4px"><b class="win-hi">${an}</b> · ${esc(c.name)}</div>${mlines(c.aMatches)}</div>
        <div class="col"><div class="tag" style="margin-bottom:4px"><b style="color:var(--accent2)">${bn}</b> · ${esc(c.name)}</div>${mlines(c.bMatches)}</div>
      </div></td></tr>`;
    return main+detail;}).join('');
  return `
    <details>
      <summary style="list-style:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;user-select:none;padding:16px 22px"><span style="font-weight:600">Ortak Rakipler (${cm.commonCount})</span> <span class="toggle-arrow">▾</span></summary>
      <div style="padding:0 22px 20px">
        <p class="sub" style="text-align:center">${verdict} <span class="tag">· satıra tıkla maçları gör</span></p>
        <div class="cmp" style="max-width:680px;margin:0 auto 6px">
          ${(()=>{const va=`${aw.w}-${aw.l}`,vb=`${bw.w}-${bw.l}`,hiA=ap>bp,hiB=bp>ap;
            return `<div class="va ${hiA?'win-hi':'win-lo'}">${va}</div><div class="lbl" style="grid-column:2;margin:0">Ortaklara Karşı</div><div class="vb ${hiB?'win-hi':'win-lo'}">${vb}</div>
            <div class="bar"><i class="ia" style="width:${(ap+bp?ap/(ap+bp)*100:50)}%"></i><i class="ib" style="width:${(ap+bp?bp/(ap+bp)*100:50)}%"></i></div>`;})()}
        </div>
        <div style="max-width:680px;margin:0 auto">
          <table><thead><tr><th>Ortak Rakip</th><th style="text-align:center">${an}</th><th style="text-align:center">${bn}</th><th style="text-align:center">Üstün</th></tr></thead>
          <tbody>${rows}</tbody></table>
        </div>
      </div>
    </details>`;
}

function clubOpponentsSection(co,bName,clubName,aId,clubOwnerName){
  const bn=esc(bName.split(' ')[0]);
  const title=`${bn} vs. ${esc(clubName)} maçları`;
  if(!co.opponents||!co.opponents.length) return `<details><summary style="list-style:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;user-select:none;padding:16px 22px"><span style="font-weight:600">${title}</span> <span class="toggle-arrow">▾</span></summary><div style="padding:0 22px 20px"><p class="muted" style="text-align:center">${bn}'un ${esc(clubName)} kulübü oyuncularına karşı maçı yok.</p></div></details>`;
  const mlines=ms=>ms.map(m=>`<div style="padding:6px 0;border-bottom:1px solid var(--line)">
    <div class="flex"><span class="badge ${m.won?'W':'L'}">${m.won?'G':'M'}</span><span class="score">${esc(m.score)||'<span class=muted>—</span>'}</span></div>
    <div class="tag" style="margin-top:3px">${esc(m.event||'')}${m.stage?' · '+esc(m.stage):''}<br>${m.tournamentId?`<a href="#/tournament/${m.tournamentId}">${esc(m.tournamentName||'turnuva')}</a> · `:''}${esc(m.date||'')}</div>
  </div>`).join('');
  const rows=co.opponents.map((o,i)=>{
    const uid=`co_${aId}_${i}`;
    const rowBg=o.w>o.l?'var(--win-soft)':o.l>o.w?'var(--loss-soft)':'rgba(176,125,18,.12)';
    const scoreCol=o.w>o.l?'var(--win)':o.l>o.w?'var(--loss)':'var(--gold)';
    const main=`<tr style="cursor:pointer;background:${rowBg}" onclick="(function(){var d=document.getElementById('${uid}');d.style.display=d.style.display==='none'?'table-row':'none';})()">
      <td><span class="tag">▸</span> <a href="#/player/${o.oppId}" onclick="event.stopPropagation()">${esc(o.oppName)}</a></td>
      <td style="text-align:center;font-weight:700;color:${scoreCol}">${o.w}-${o.l}</td>
      <td style="text-align:center">${o.w+o.l} maç</td></tr>`;
    const detail=`<tr id="${uid}" style="display:none"><td colspan="3" style="background:var(--panel2)">
      <div style="padding:8px 4px">${mlines(o.matches)}</div></td></tr>`;
    return main+detail;}).join('');
  const total=co.opponents.reduce((s,o)=>s+o.w+o.l,0);
  const wins=co.opponents.reduce((s,o)=>s+o.w,0);
  return `
    <details>
      <summary style="list-style:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;user-select:none;padding:16px 22px"><span style="font-weight:600">${title} (${total})</span> <span class="toggle-arrow">▾</span></summary>
      <div style="padding:0 22px 20px">
        <p class="sub" style="text-align:center"><b>${bn}</b>'un <a href="#/player/${aId}" style="color:inherit">${esc(clubName)}</a> kulübü oyuncularına karşı ${total} maç · ${wins} galibiyet <span class="tag">· satıra tıkla detay</span></p>
        <div style="max-width:680px;margin:0 auto">
          <table><thead><tr><th>Rakip</th><th style="text-align:center">${bn}</th><th style="text-align:center">Toplam</th></tr></thead>
          <tbody>${rows}</tbody></table>
        </div>
      </div>
    </details>`;
}

// ---------- search ----------
let st;
$('#q').addEventListener('input',e=>{clearTimeout(st);const v=e.target.value.trim();
  if(v.length<2){$('#sr').classList.remove('show');return;}
  st=setTimeout(async()=>{const d=await api('/search'+qs({q:v}));
    let h='';
    if(d.players.length){h+='<div class="cat">Oyuncular</div>'+d.players.map(p=>`<div class="r" onclick="go('#/player/${p.player_id}')"><span>${esc(p.name)}</span><span class="muted">${p.age_group?p.age_group+'Y ':''}${Math.round(p.rating)}</span></div>`).join('');}
    if(d.clubs.length){h+='<div class="cat">Kulüpler</div>'+d.clubs.map(c=>`<div class="r" onclick="go('#/rankings?club_id=${c.club_id}')"><span>${esc(c.name)}</span><span class="muted">${esc(c.city||'')}</span></div>`).join('');}
    $('#sr').innerHTML=h||'<div class="r muted">sonuç yok</div>';$('#sr').classList.add('show');},200);});
document.addEventListener('click',e=>{if(!e.target.closest('.search')&&!e.target.closest('.search-toggle')){$('#sr').classList.remove('show');$('.search')?.classList.remove('open');}});
window.openMobileSearch=()=>{const s=$('.search');s.classList.add('open');const i=$('#q');i.focus();};
$('#q').addEventListener('blur',()=>setTimeout(()=>{if(window.innerWidth<=980&&!$('#sr').classList.contains('show'))$('.search').classList.remove('open');},200));
$('#q').addEventListener('keydown',e=>{if(e.key==='Escape'){$('#sr').classList.remove('show');$('.search').classList.remove('open');$('#q').blur();}});
window.go=h=>{$('#q').value='';$('#sr').classList.remove('show');$('.search')?.classList.remove('open');location.hash=h;};

// ---------- router ----------
function qs(o){const p=Object.entries(o).filter(([,v])=>v!=='').map(([k,v])=>k+'='+encodeURIComponent(v));return p.length?'?'+p.join('&'):'';}
function parseQ(s){const o={};(s||'').split('&').forEach(kv=>{if(!kv)return;const[k,v]=kv.split('=');o[k]=decodeURIComponent(v||'');});return o;}
async function route(){
  setNav();
  const h=location.hash.slice(1)||'/';
  const [path,query]=h.split('?');
  const parts=path.split('/').filter(Boolean);
  try{
    if(path==='/'||path==='') return home();
    if(parts[0]==='rankings'){return rankings(parseQ(query));}
    if(parts[0]==='player') return player(parts[1]);
    if(parts[0]==='h2h') return h2h(parts[1],parts[2]);
    if(parts[0]==='compare') return compare(parseQ(query));
    if(parts[0]==='compare-clubs') return compareClubs(parseQ(query));
    if(parts[0]==='players') return players_dir(parseQ(query));
    if(parts[0]==='tournaments') return tournaments(parseQ(query));
    if(parts[0]==='tournament') return tournament(parts[1]);
    if(parts[0]==='clubs') return clubs();
    app().innerHTML='<p class="muted">Sayfa yok.</p>';
  }catch(e){app().innerHTML='<p class="muted">Hata: '+esc(e.message)+'</p>';}
}
window.addEventListener('hashchange',route);
window.bootDB().then(route).catch(e=>{app().innerHTML='<p class="muted" style="padding:40px">Veri yüklenemedi: '+esc(e.message)+'</p>';});
</script>
</body>
