<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tennos — Junior Tenis Analitik</title>
<style>
  :root{
    --bg:#0f1419; --panel:#171f29; --panel2:#1e2832; --line:#2a3744;
    --txt:#e6edf3; --dim:#8b98a5; --accent:#c5ff4a; --accent2:#4ab0ff;
    --win:#3fb950; --loss:#f85149; --gold:#ffd33d;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg);color:var(--txt);font-size:14px;line-height:1.5}
  a{color:var(--accent2);text-decoration:none;cursor:pointer}
  a:hover{text-decoration:underline}
  header{position:sticky;top:0;z-index:10;background:#0f1419ee;backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);padding:12px 20px;display:flex;align-items:center;gap:18px}
  .logo{font-weight:800;font-size:18px;letter-spacing:-.5px}
  .logo span{color:var(--accent)}
  nav{display:flex;gap:14px}
  nav a{color:var(--dim);font-weight:600;padding:4px 2px}
  nav a.active,nav a:hover{color:var(--txt);text-decoration:none}
  .search{margin-left:auto;position:relative}
  .search input{background:var(--panel2);border:1px solid var(--line);color:var(--txt);
    padding:8px 12px;border-radius:8px;width:240px;outline:none}
  .search input:focus{border-color:var(--accent2)}
  .results{position:absolute;top:42px;right:0;width:320px;background:var(--panel);
    border:1px solid var(--line);border-radius:10px;overflow:hidden;display:none;box-shadow:0 8px 30px #0008}
  .results.show{display:block}
  .results .r{padding:9px 12px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:8px}
  .results .r:hover{background:var(--panel2)}
  .results .cat{font-size:11px;color:var(--dim);padding:6px 12px;background:var(--panel2);text-transform:uppercase;letter-spacing:.5px}
  main{max-width:1080px;margin:0 auto;padding:24px 20px 80px}
  h1{font-size:24px;margin:0 0 4px} h2{font-size:17px;margin:28px 0 12px}
  .sub{color:var(--dim);margin:0 0 18px}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin:18px 0}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px}
  .card .v{font-size:26px;font-weight:800;color:var(--accent)}
  .card .l{color:var(--dim);font-size:12px;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
  .filters{display:flex;gap:10px;flex-wrap:wrap;margin:0 0 16px}
  select,.btn{background:var(--panel2);border:1px solid var(--line);color:var(--txt);
    padding:8px 12px;border-radius:8px;outline:none;cursor:pointer;font-size:13px}
  table{width:100%;border-collapse:collapse;background:var(--panel);border-radius:12px;overflow:hidden}
  th,td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--line)}
  th{color:var(--dim);font-size:11px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:var(--panel2)}
  .rank{font-weight:800;color:var(--dim);width:42px}
  .rank.top{color:var(--gold)}
  .rating{font-weight:800;color:var(--accent)}
  .pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;background:var(--panel2);border:1px solid var(--line)}
  .pill.age{color:var(--accent2);border-color:#2d4a63}
  .w{color:var(--win);font-weight:700} .l{color:var(--loss);font-weight:700}
  .badge{font-size:11px;padding:2px 7px;border-radius:6px;font-weight:700}
  .badge.W{background:#1a3a24;color:var(--win)} .badge.L{background:#3a1a1c;color:var(--loss)}
  .profile-head{display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap;margin-bottom:8px}
  .bigrating{font-size:44px;font-weight:800;color:var(--accent);line-height:1}
  .muted{color:var(--dim)}
  .row{display:flex;gap:24px;flex-wrap:wrap}
  .col{flex:1;min-width:280px}
  .matchline{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line)}
  .matchline:last-child{border:none}
  .score{font-variant-numeric:tabular-nums;font-weight:600;white-space:nowrap}
  .loading{color:var(--dim);padding:40px;text-align:center}
  .vs{display:flex;align-items:center;justify-content:center;gap:18px;margin:18px 0}
  .vs .n{font-size:20px;font-weight:800} .vs .c{font-size:40px;font-weight:800;color:var(--accent)}
  .tag{font-size:11px;color:var(--dim)}
  .flex{display:flex;gap:8px;align-items:center}
  .undef{color:var(--gold);font-weight:700}
  .pickers{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:18px 0}
  .picker{position:relative}
  .picker input{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--txt);
    padding:11px 14px;border-radius:10px;outline:none;font-size:15px}
  .picker input:focus{border-color:var(--accent2)}
  .picker .results{top:48px;left:0;width:100%}
  .picked{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px 14px;
    display:flex;align-items:center;gap:10px}
  .picked .x{margin-left:auto;color:var(--dim);cursor:pointer;font-weight:700;padding:0 4px}
  .picked .x:hover{color:var(--loss)}
  .cmp{display:grid;grid-template-columns:1fr auto 1fr;gap:6px 14px;align-items:center;margin:6px 0}
  .cmp .lbl{grid-column:1/4;text-align:center;font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-top:10px}
  .cmp .va{text-align:right;font-weight:700;font-size:18px} .cmp .vb{text-align:left;font-weight:700;font-size:18px}
  .cmp .bar{grid-column:1/4;height:6px;border-radius:4px;background:var(--panel2);display:flex;overflow:hidden}
  .cmp .bar i{display:block;height:100%} .bar .ia{background:var(--accent)} .bar .ib{background:var(--accent2)}
  .win-hi{color:var(--accent)} .win-lo{color:var(--dim)}

  /* ---- Mobile ---- */
  @media (max-width:760px){
    header{flex-wrap:wrap;gap:10px;padding:10px 14px}
    .logo{order:1}
    .search{order:2;margin-left:auto;width:auto}
    .search input{width:150px}
    .results{width:300px;max-width:calc(100vw - 28px)}
    nav{order:3;width:100%;overflow-x:auto;flex-wrap:nowrap;gap:18px;padding-bottom:2px;-webkit-overflow-scrolling:touch}
    nav::-webkit-scrollbar{display:none}
    nav a{white-space:nowrap}
    main{padding:16px 14px 64px}
    h1{font-size:20px} h2{font-size:16px;margin:22px 0 10px}
    .card{padding:13px} .card .v{font-size:22px}
    .bigrating{font-size:34px}
    /* tables scroll horizontally instead of clipping */
    table{display:block;overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch}
    th,td{padding:8px 10px}
    .pickers{grid-template-columns:1fr;gap:12px}
    .vs{gap:10px} .vs .c{font-size:30px} .vs .n{font-size:16px}
    .cmp{gap:5px 10px} .cmp .va,.cmp .vb{font-size:16px}
    .profile-head{gap:12px}
    .profile-head>div:last-child{margin-left:0!important;text-align:left!important;width:100%}
    .bigrating{font-size:30px}
    .matchline{flex-wrap:wrap;gap:6px 10px}
    .matchline>span[style*="margin-left:auto"],.matchline>span[style*="margin-left: auto"]{margin-left:0!important;text-align:left!important;flex-basis:100%}
    .filters input,.filters select{flex:1 1 auto;min-width:0}
  }
</style>
</head>
<body>
<header>
  <div class="logo">TENN<span>OS</span></div>
  <nav id="nav">
    <a href="#/">Özet</a>
    <a href="#/rankings">Sıralama</a>
    <a href="#/players">Oyuncular</a>
    <a href="#/tournaments">Turnuvalar</a>
    <a href="#/clubs">Kulüpler</a>
    <a href="#/compare">Karşılaştır</a>
  </nav>
  <div class="search">
    <input id="q" placeholder="Oyuncu / kulüp ara…" autocomplete="off">
    <div class="results" id="sr"></div>
  </div>
</header>
<main id="app"><div class="loading">yükleniyor…</div></main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.min.js"></script>
<script>
// ===== Client-side SQLite (sql.js). Mirrors the old serve.py JSON API. =====
(function(){
  let DB=null;
  window.bootDB=async function(){
    if(DB) return;
    document.getElementById('app').innerHTML='<div class="loading">veri yükleniyor… (~10 MB, ilk açılışta)</div>';
    const SQL=await initSqlJs({locateFile:f=>`https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/${f}`});
    const resp=await fetch('tennos-web.db.gz');
    if(!resp.ok) throw new Error('db indirilemedi');
    let buf;
    if(resp.headers.get('content-encoding')||resp.headers.get('content-type')==='application/x-gzip'){
      buf=await resp.arrayBuffer(); // already decoded by browser
      // if still gzip magic, decompress
      const u8=new Uint8Array(buf);
      if(u8[0]===0x1f&&u8[1]===0x8b) buf=await ungzip(resp,u8);
    } else {
      buf=await ungzip(resp);
    }
    DB=new SQL.Database(new Uint8Array(buf));
  };
  async function ungzip(resp,pre){
    const stream=(pre?new Response(pre):resp).body.pipeThrough(new DecompressionStream('gzip'));
    return await new Response(stream).arrayBuffer();
  }
  // run sql -> array of plain objects
  function Q(sql,params){
    const st=DB.prepare(sql); if(params) st.bind(params);
    const out=[]; while(st.step()) out.push(st.getAsObject()); st.free(); return out;
  }
  const one=(sql,p)=>{const r=Q(sql,p);return r[0]||null;};
  const scalar=(sql,p)=>{const r=one(sql,p);return r?Object.values(r)[0]:null;};
  // Turkish-aware case-insensitive search folding (mirrors serve.py).
  const FOLD_PAIRS=[['ı','I'],['İ','I'],['ş','S'],['Ş','S'],['ğ','G'],['Ğ','G'],['ç','C'],['Ç','C'],['ö','O'],['Ö','O'],['ü','U'],['Ü','U']];
  function fold(s){let r=s||'';for(const[a,b]of FOLD_PAIRS)r=r.split(a).join(b);return r.toUpperCase();}
  function foldsql(col){let e=col;for(const[a,b]of FOLD_PAIRS)e=`REPLACE(${e},'${a}','${b}')`;return `UPPER(${e})`;}
  const nameCache={};
  function nameOf(id){ if(id==null) return null; if(!(id in nameCache)){const r=one('SELECT name FROM players WHERE player_id=?',[id]);nameCache[id]=r?r.name:('#'+id);} return nameCache[id]; }

  function buildScore(mid, firstIsViewer){
    const sets=Q('SELECT set_number,p1_games,p1_tiebreak,p2_games,p2_tiebreak FROM sets WHERE match_id=? ORDER BY set_number',[mid]);
    const parts=[];
    for(const s of sets){
      let a=firstIsViewer?s.p1_games:s.p2_games, b=firstIsViewer?s.p2_games:s.p1_games;
      let ta=firstIsViewer?s.p1_tiebreak:s.p2_tiebreak, tb=firstIsViewer?s.p2_tiebreak:s.p1_tiebreak;
      if(a==null&&b==null) continue;
      let pc=`${a==null?'-':a}-${b==null?'-':b}`;
      if(ta!=null||tb!=null) pc+=`(${ta==null?0:ta}-${tb==null?0:tb})`;
      parts.push(pc);
    }
    return parts.join(' ');
  }
  const dkey=s=>{const m=/(\d{1,2})[.\-/](\d{1,2})[.\-/](\d{4})/.exec(s||'');return m?(+m[3])*1e4+(+m[2])*100+(+m[1]):0;};

  function playerMatches(pid){
    const rows=Q(`SELECT m.match_id,m.match_date,m.event,m.stage,m.winner_id,m.loser_id,m.p1_id,m.tournament_id,t.name tname,t.city
      FROM matches m LEFT JOIN tournaments t ON t.tournament_id=m.tournament_id
      WHERE (m.winner_id=? OR m.loser_id=?) AND m.winner_id IS NOT NULL AND m.loser_id IS NOT NULL`,[pid,pid]);
    rows.sort((x,y)=>dkey(y.match_date)-dkey(x.match_date));
    return rows.map(r=>{const won=r.winner_id===pid, opp=won?r.loser_id:r.winner_id;
      return {matchId:r.match_id,date:r.match_date,event:r.event,stage:r.stage,won,opponentId:opp,opponentName:nameOf(opp),
        score:buildScore(r.match_id,won?(r.p1_id===pid):(r.p1_id===pid)),tournamentId:r.tournament_id,tournamentName:r.tname,city:r.city};});
  }
  function matchesBetween(p,opp){
    const rows=Q(`SELECT m.match_id,m.match_date,m.event,m.stage,m.winner_id,m.p1_id,m.tournament_id,t.name tname
      FROM matches m LEFT JOIN tournaments t ON t.tournament_id=m.tournament_id
      WHERE m.result_type='completed' AND ((m.winner_id=? AND m.loser_id=?) OR (m.winner_id=? AND m.loser_id=?))`,[p,opp,opp,p]);
    return rows.map(r=>({date:r.match_date,event:r.event,stage:r.stage,won:r.winner_id===p,
      tournamentId:r.tournament_id,tournamentName:r.tname,score:buildScore(r.match_id,r.p1_id===p)}));
  }
  function oppRecord(pid){
    const rows=Q(`SELECT winner_id,loser_id FROM matches WHERE result_type='completed' AND winner_id IS NOT NULL AND loser_id IS NOT NULL AND (winner_id=? OR loser_id=?)`,[pid,pid]);
    const rec={}; for(const r of rows){const won=r.winner_id===pid,o=won?r.loser_id:r.winner_id;(rec[o]=rec[o]||{w:0,l:0})[won?'w':'l']++;} return rec;
  }

  const ep={
    stats(){
      return {players:scalar('SELECT count(*) FROM players'),ratedPlayers:scalar('SELECT count(*) FROM player_ratings'),
        clubs:scalar('SELECT count(*) FROM clubs'),tournaments:scalar('SELECT count(*) FROM tournaments'),
        matches:scalar('SELECT count(*) FROM matches'),completed:scalar("SELECT count(*) FROM matches WHERE result_type='completed'"),
        byAgeGroup:Q("SELECT age_group,count(*) n FROM player_ratings WHERE age_group IS NOT NULL GROUP BY age_group ORDER BY age_group")};
    },
    rankings(q){
      const w=['1=1'],p=[];
      if(q.age_group){w.push('pr.age_group=?');p.push(+q.age_group);}
      if(q.club_id){w.push('pr.club_id=?');p.push(+q.club_id);}
      if(q.gender){w.push('pr.gender=?');p.push(q.gender);}
      if(q.q){w.push(foldsql('pr.name')+' LIKE ?');p.push('%'+fold(q.q)+'%');}
      const mm=q.min_matches!=null?+q.min_matches:5; w.push('pr.matches>=?');p.push(mm);
      const lim=Math.min(+(q.limit||50),500), off=+(q.offset||0);
      const ord=q.age_group?'pr.age_group_rank':(q.gender?'pr.gender_rank':'pr.overall_rank');
      const wc=w.join(' AND ');
      const agSel=q.age_group
        ? `,(SELECT count(*) FROM matches WHERE winner_id=pr.player_id AND age_group=${+q.age_group} AND result_type='completed') ag_wins,(SELECT count(*) FROM matches WHERE loser_id=pr.player_id AND age_group=${+q.age_group} AND result_type='completed') ag_losses`
        : '';
      const rows=Q(`SELECT pr.*,p.gender pgender,p.city player_city${agSel} FROM player_ratings pr LEFT JOIN players p ON p.player_id=pr.player_id WHERE ${wc} ORDER BY ${ord} LIMIT ? OFFSET ?`,[...p,lim,off]);
      if(q.age_group) rows.forEach(r=>{r.wins=r.ag_wins;r.losses=r.ag_losses;});
      const total=scalar(`SELECT count(*) FROM player_ratings pr LEFT JOIN players p ON p.player_id=pr.player_id WHERE ${wc}`,p);
      return {total,limit:lim,offset:off,rankings:rows};
    },
    player(id){
      id=+id; const rating=one('SELECT * FROM player_ratings WHERE player_id=?',[id]);
      const base=one('SELECT * FROM players WHERE player_id=?',[id]);
      if(!rating&&!base) return {error:'player not found'};
      const matches=playerMatches(id);
      const stages={},opp={};
      for(const m of matches){const st=m.stage||'—';(stages[st]=stages[st]||{w:0,l:0})[m.won?'w':'l']++;
        const o=opp[m.opponentId]=opp[m.opponentId]||{name:m.opponentName,w:0,l:0};o[m.won?'w':'l']++;}
      const top=Object.entries(opp).map(([k,v])=>({playerId:+k,...v,total:v.w+v.l})).sort((a,b)=>b.total-a.total).slice(0,8);
      return {player:base,rating,recentMatches:matches.slice(0,25),totalMatches:matches.length,stageRecord:stages,topOpponents:top};
    },
    h2h(a,b){a=+a;b=+b;
      const rows=Q(`SELECT m.match_id,m.match_date,m.event,m.stage,m.winner_id,m.loser_id,m.p1_id,m.tournament_id,t.name tname
        FROM matches m LEFT JOIN tournaments t ON t.tournament_id=m.tournament_id
        WHERE m.result_type='completed' AND ((m.winner_id=? AND m.loser_id=?) OR (m.winner_id=? AND m.loser_id=?))`,[a,b,b,a]);
      const wa=rows.filter(r=>r.winner_id===a).length;
      return {a:{playerId:a,name:nameOf(a),wins:wa},b:{playerId:b,name:nameOf(b),wins:rows.length-wa},total:rows.length,
        matches:rows.map(r=>({date:r.match_date,event:r.event,stage:r.stage,winnerId:r.winner_id,aWon:r.winner_id===a,
          tournamentId:r.tournament_id,tournamentName:r.tname,score:buildScore(r.match_id,r.p1_id===a)}))};
    },
    common(a,b){a=+a;b=+b;
      const ra=oppRecord(a),rb=oppRecord(b);
      const ids=Object.keys(ra).map(Number).filter(x=>x in rb&&x!==a&&x!==b);
      let as={w:0,l:0},bs={w:0,l:0},ab=0,bb=0,ev=0;
      const common=ids.map(o=>{const aw=ra[o].w,al=ra[o].l,bw=rb[o].w,bl=rb[o].l;
        as.w+=aw;as.l+=al;bs.w+=bw;bs.l+=bl;const arr=aw+al?aw/(aw+al):0,br=bw+bl?bw/(bw+bl):0;
        if(arr>br)ab++;else if(br>arr)bb++;else ev++;
        return {opponentId:o,name:nameOf(o),aW:aw,aL:al,bW:bw,bL:bl,total:aw+al+bw+bl,aMatches:matchesBetween(a,o),bMatches:matchesBetween(b,o)};
      }).sort((x,y)=>y.total-x.total);
      return {a:{playerId:a,name:nameOf(a)},b:{playerId:b,name:nameOf(b)},commonCount:ids.length,
        aVsCommon:as,bVsCommon:bs,aBetter:ab,bBetter:bb,even:ev,common};
    },
    players(q){
      const w=['1=1'],p=[];
      if(q.q){w.push(foldsql('p.name')+' LIKE ?');p.push('%'+fold(q.q)+'%');}
      if(q.gender){w.push('p.gender=?');p.push(q.gender);}
      if(q.birth_year){w.push('p.birth_year=?');p.push(+q.birth_year);}
      if(q.city){w.push('p.city=?');p.push(q.city);}
      if(q.club_id){w.push('p.club_id=?');p.push(+q.club_id);}
      if(q.rated==='1') w.push('pr.player_id IS NOT NULL');
      const lim=Math.min(+(q.limit||50),200),off=+(q.offset||0),wc=w.join(' AND ');
      const rows=Q(`SELECT p.player_id,p.name,p.birth_year,p.gender,p.club_id,p.club_name,p.city,pr.rating,pr.matches,pr.age_group
        FROM players p LEFT JOIN player_ratings pr ON pr.player_id=p.player_id WHERE ${wc}
        ORDER BY (pr.rating IS NULL), pr.rating DESC, p.name LIMIT ? OFFSET ?`,[...p,lim,off]);
      const total=scalar(`SELECT count(*) FROM players p LEFT JOIN player_ratings pr ON pr.player_id=p.player_id WHERE ${wc}`,p);
      const years=Q('SELECT DISTINCT birth_year FROM players WHERE birth_year IS NOT NULL ORDER BY birth_year').map(r=>r.birth_year);
      return {total,limit:lim,offset:off,years,players:rows};
    },
    tournaments(q){
      const w=['1=1'],p=[];
      if(q.q){w.push('('+foldsql('t.name')+' LIKE ? OR '+foldsql('t.title')+' LIKE ?)');p.push('%'+fold(q.q)+'%','%'+fold(q.q)+'%');}
      if(q.city){w.push('t.city=?');p.push(q.city);}
      if(q.year){w.push('t.year=?');p.push(+q.year);}
      const lim=Math.min(+(q.limit||200),600),wc=w.join(' AND ');
      const rows=Q(`SELECT t.tournament_id,t.name,t.city,t.start_date,t.year,t.type_text,t.surface,t.court_type,c.name club_name,
        (SELECT count(*) FROM matches m WHERE m.tournament_id=t.tournament_id) match_count
        FROM tournaments t LEFT JOIN clubs c ON c.club_id=t.club_id WHERE ${wc}
        ORDER BY (match_count>0) DESC, t.year DESC, t.tournament_id DESC LIMIT ?`,[...p,lim]);
      const years=Q('SELECT DISTINCT year FROM tournaments WHERE year IS NOT NULL ORDER BY year DESC').map(r=>r.year);
      return {total:rows.length,years,tournaments:rows};
    },
    tournament(id){id=+id;
      const t=one('SELECT * FROM tournaments WHERE tournament_id=?',[id]); if(!t) return {error:'tournament not found'};
      const club=t.club_id?one('SELECT name,city FROM clubs WHERE club_id=?',[t.club_id]):null;
      const cats=Q(`SELECT event,age_group,gender,count(*) n,sum(CASE WHEN result_type='completed' THEN 1 ELSE 0 END) completed
        FROM matches WHERE tournament_id=? AND event<>'' GROUP BY event ORDER BY n DESC`,[id]);
      const champs={};
      for(const r of Q("SELECT event,winner_id FROM matches WHERE tournament_id=? AND stage LIKE '%Final%' AND winner_id IS NOT NULL",[id])) if(!(r.event in champs)) champs[r.event]=r.winner_id;
      const mrows=Q('SELECT match_id,event,stage,day_name,match_date,court,winner_id,loser_id,p1_id FROM matches WHERE tournament_id=?',[id]);
      const matches=[];
      for(const r of mrows){ if(r.winner_id==null||r.loser_id==null) continue;
        matches.push({event:r.event,stage:r.stage,dayName:r.day_name,date:r.match_date,court:r.court,
          winnerId:r.winner_id,winnerName:nameOf(r.winner_id),loserId:r.loser_id,loserName:nameOf(r.loser_id),
          score:buildScore(r.match_id,r.p1_id===r.winner_id)});}
      for(const c of cats){const cid=champs[c.event];c.championId=cid||null;c.championName=cid?nameOf(cid):null;}
      return {tournament:t,club,categories:cats,matches};
    },
    clubs(q){
      const w=['1=1'],p=[]; if(q.q){w.push(foldsql('c.name')+' LIKE ?');p.push('%'+fold(q.q)+'%');}
      const lim=Math.min(+(q.limit||100),600);
      const rows=Q(`SELECT c.club_id,c.name,c.city,
        (SELECT count(*) FROM players pp WHERE pp.club_id=c.club_id) player_count,
        (SELECT count(*) FROM player_ratings pr WHERE pr.club_id=c.club_id) rated_count
        FROM clubs c WHERE ${w.join(' AND ')} ORDER BY player_count DESC LIMIT ?`,[...p,lim]);
      return {clubs:rows};
    },
    search(q){
      const t=(q.q||'').trim(); if(t.length<2) return {players:[],clubs:[]};
      const like='%'+fold(t)+'%';
      return {players:Q('SELECT player_id,name,age_group,rating,club_name FROM player_ratings WHERE '+foldsql('name')+' LIKE ? ORDER BY rating DESC LIMIT 15',[like]),
        clubs:Q('SELECT club_id,name,city FROM clubs WHERE '+foldsql('name')+' LIKE ? LIMIT 10',[like])};
    }
  };

  window.dbApi=async function(pathQuery){
    const [path,query]=pathQuery.split('?');
    const parts=path.split('/').filter(Boolean);
    const q={}; (query||'').split('&').forEach(kv=>{if(!kv)return;const i=kv.indexOf('=');q[decodeURIComponent(kv.slice(0,i))]=decodeURIComponent(kv.slice(i+1));});
    const r=parts[0];
    if(r==='stats') return ep.stats();
    if(r==='rankings') return ep.rankings(q);
    if(r==='player') return ep.player(parts[1]);
    if(r==='h2h') return ep.h2h(parts[1],parts[2]);
    if(r==='common') return ep.common(parts[1],parts[2]);
    if(r==='players') return ep.players(q);
    if(r==='tournaments') return ep.tournaments(q);
    if(r==='tournament') return ep.tournament(parts[1]);
    if(r==='clubs') return ep.clubs(q);
    if(r==='search') return ep.search(q);
    return {error:'not found'};
  };
})();
</script>

    </div>

      <div class="card"><div class="v">${r&&r.gender?'#'+r.gender_rank:'—'}</div><div class="l">${r&&r.gender?esc(r.gender)+' Sıra':'Cinsiyet Sıra'}</div></div>

    </div>
    <div class="row">

async function compare(params){
  const a=params.a||'', b=params.b||'';
  app().innerHTML=`
    <h1>Oyuncu Karşılaştırma</h1>
    <p class="sub">İki oyuncu seç — yan yana istatistik + head-to-head.</p>

    <div id="cmpOut"></div>`;
  renderSlot('a',a); renderSlot('b',b);
  if(a&&b) renderCompare(a,b);
  else $('#cmpOut').innerHTML='<p class="muted" style="text-align:center;padding:30px">İki oyuncu seçince karşılaştırma çıkar.</p>';
}

async function renderSlot(slot,id){
  const el=$('#slot'+slot.toUpperCase());
  if(id){
    el.innerHTML=`<div class="picked"><span class="muted">yükleniyor…</span></div>`;
    const d=await pinfo(id); const r=d.rating||{}; const nm=(r.name)||(d.player&&d.player.name)||('#'+id);
    el.innerHTML=`<div class="picked">
      <b>${esc(nm)}</b> ${ageP(r.age_group)}
      <span class="muted">${r.rating?Math.round(r.rating):'—'}</span>
      <span class="x" title="kaldır">✕</span></div>`;
    el.querySelector('.x').onclick=()=>setSlot(slot,'');
    return;
  }
  el.innerHTML=`<div class="picker">
    <input placeholder="${slot==='a'?'1.':'2.'} oyuncu ara…" autocomplete="off">
    <div class="results"></div></div>`;
  const inp=el.querySelector('input'), res=el.querySelector('.results');
  let t; inp.oninput=()=>{clearTimeout(t);const v=inp.value.trim();
    if(v.length<2){res.classList.remove('show');return;}
    t=setTimeout(async()=>{const d=await api('/search'+qs({q:v}));
      res.innerHTML=d.players.length?d.players.map(p=>`<div class="r" data-id="${p.player_id}"><span>${esc(p.name)}</span><span class="muted">${p.age_group?p.age_group+'Y ':''}${Math.round(p.rating)}</span></div>`).join(''):'<div class="r muted">sonuç yok</div>';
      res.classList.add('show');
      res.querySelectorAll('.r[data-id]').forEach(r2=>r2.onclick=()=>setSlot(slot,r2.dataset.id));
    },200);};
  inp.onblur=()=>setTimeout(()=>res.classList.remove('show'),200);
}

async function renderCompare(a,b){
  const [da,db,hh,cm]=await Promise.all([pinfo(a),pinfo(b),api(`/h2h/${a}/${b}`),api(`/common/${a}/${b}`)]);
  const ra=da.rating||{}, rb=db.rating||{};
  const pct=r=>r.wins+r.losses?Math.round(r.wins/(r.wins+r.losses)*100):0;
  const bar=(va,vb,inv)=>{ // inv: lower better (rank)
    let pa=va+vb?va/(va+vb)*100:50; if(inv) pa=va+vb?vb/(va+vb)*100:50;
    return `<div class="bar"><i class="ia" style="width:${pa}%"></i><i class="ib" style="width:${100-pa}%"></i></div>`;};
  const row=(label,va,vb,inv)=>{
    const na=parseFloat(va)||0, nb=parseFloat(vb)||0;
    const hiA=inv?na<nb:na>nb, hiB=inv?nb<na:nb>na;
    return `<div class="cmp">
      <div class="va ${hiA?'win-hi':'win-lo'}">${va}</div><div class="lbl" style="grid-column:2;margin:0">${label}</div><div class="vb ${hiB?'win-hi':'win-lo'}">${vb}</div>
      ${bar(na,nb,inv)}</div>`;};
  const matches=hh.matches.map(m=>`<div class="matchline">
      <span class="badge ${m.aWon?'W':'L'}">${m.aWon?esc(hh.a.name.split(' ')[0]):esc(hh.b.name.split(' ')[0])}</span>
      <span class="score">${esc(m.score)}</span>
      <span style="margin-left:auto" class="tag">${esc(m.event||'')} ${m.stage?'· '+esc(m.stage):''} · ${esc(m.date||'')}</span>
    </div>`).join('')||'<p class="muted" style="text-align:center">Hiç karşılaşmamışlar.</p>';
  $('#cmpOut').innerHTML=`
    <div class="vs">
      <div style="text-align:right"><div class="n"><a href="#/player/${a}">${esc(ra.name||da.player&&da.player.name||'#'+a)}</a></div><div class="tag">H2H</div></div>
      <div class="c">${hh.a.wins} – ${hh.b.wins}</div>
      <div><div class="n"><a href="#/player/${b}">${esc(rb.name||db.player&&db.player.name||'#'+b)}</a></div><div class="tag">karşılaşma: ${hh.total}</div></div>
    </div>
    <div style="max-width:640px;margin:0 auto">
      ${row('Elo Reyting',Math.round(ra.rating||0),Math.round(rb.rating||0))}
      ${row('Zirve Elo',Math.round(ra.peak_rating||0),Math.round(rb.peak_rating||0))}
      ${row('Genel Sıra',ra.overall_rank?'#'+ra.overall_rank:'—',rb.overall_rank?'#'+rb.overall_rank:'—',true)}
      ${row('Kazanma %',pct(ra)+'%',pct(rb)+'%')}
      ${row('Galibiyet',ra.wins||0,rb.wins||0)}
      ${row('Toplam Maç',ra.matches||0,rb.matches||0)}
      <div class="cmp"><div class="va muted">${ra.age_group?ra.age_group+' Yaş':'—'}</div><div class="lbl" style="grid-column:2;margin:0">Yaş Grubu</div><div class="vb muted">${rb.age_group?rb.age_group+' Yaş':'—'}</div></div>
    </div>
    <h2 style="text-align:center">Karşılaşmalar</h2>
    <div style="max-width:560px;margin:0 auto">${matches}</div>
    ${commonSection(cm,a,b)}`;
}

function commonSection(cm,a,b){
  const an=esc(cm.a.name.split(' ')[0]), bn=esc(cm.b.name.split(' ')[0]);
  if(!cm.commonCount) return `<h2 style="text-align:center">Ortak Rakipler</h2><p class="muted" style="text-align:center">Ortak rakip yok.</p>`;
  const aw=cm.aVsCommon, bw=cm.bVsCommon;
  const ap=aw.w+aw.l?aw.w/(aw.w+aw.l):0, bp=bw.w+bw.l?bw.w/(bw.w+bw.l):0;
  let verdict;
  if(cm.aBetter>cm.bBetter) verdict=`<b class="win-hi">${an}</b> ortak rakiplere karşı daha başarılı`;
  else if(cm.bBetter>cm.aBetter) verdict=`<b class="win-hi">${bn}</b> ortak rakiplere karşı daha başarılı`;
  else verdict=`ortak rakiplerde başa baş`;
  const mlines=(ms,name)=>ms.map(m=>`<div style="padding:6px 0;border-bottom:1px solid var(--line)">
      <div class="flex"><span class="badge ${m.won?'W':'L'}">${m.won?'G':'M'}</span><span class="score">${esc(m.score)||'<span class=muted>—</span>'}</span></div>
      <div class="tag" style="margin-top:3px">${esc(m.event||'')}${m.stage?' · '+esc(m.stage):''}<br>${m.tournamentId?`<a href="#/tournament/${m.tournamentId}">${esc(m.tournamentName||'turnuva')}</a> · `:''}${esc(m.date||'')}</div>
    </div>`).join('')||'<span class="muted tag">maç yok</span>';
  const rows=cm.common.map((c,i)=>{
    const ar=c.aW+c.aL?c.aW/(c.aW+c.aL):0, br=c.bW+c.bL?c.bW/(c.bW+c.bL):0;
    const main=`<tr style="cursor:pointer" onclick="(function(e){var d=document.getElementById('cd${i}');d.style.display=d.style.display==='none'?'table-row':'none';})()">
      <td><span class="tag">▸</span> <a href="#/player/${c.opponentId}" onclick="event.stopPropagation()">${esc(c.name)}</a></td>
      <td style="text-align:center" class="${ar>br?'win-hi':''}">${c.aW}-${c.aL}</td>
      <td style="text-align:center" class="${br>ar?'win-hi':''}">${c.bW}-${c.bL}</td>
      <td style="text-align:center">${ar>br?'◀ '+an:br>ar?bn+' ▶':'='}</td></tr>`;
    const detail=`<tr id="cd${i}" style="display:none"><td colspan="4" style="background:var(--panel2)">
      <div class="row" style="gap:24px">
        <div class="col"><div class="tag" style="margin-bottom:4px"><b class="win-hi">${an}</b> · ${esc(c.name)}</div>${mlines(c.aMatches)}</div>
        <div class="col"><div class="tag" style="margin-bottom:4px"><b style="color:var(--accent2)">${bn}</b> · ${esc(c.name)}</div>${mlines(c.bMatches)}</div>
      </div></td></tr>`;
    return main+detail;}).join('');
  return `
    <h2 style="text-align:center">Ortak Rakipler · ${cm.commonCount}</h2>
    <p class="sub" style="text-align:center">${verdict} <span class="tag">· satıra tıkla maçları gör</span></p>
    <div class="cmp" style="max-width:680px;margin:0 auto 6px">
      ${(()=>{const va=`${aw.w}-${aw.l}`,vb=`${bw.w}-${bw.l}`,hiA=ap>bp,hiB=bp>ap;
        return `<div class="va ${hiA?'win-hi':'win-lo'}">${va}</div><div class="lbl" style="grid-column:2;margin:0">Ortaklara Karşı</div><div class="vb ${hiB?'win-hi':'win-lo'}">${vb}</div>
        <div class="bar"><i class="ia" style="width:${(ap+bp?ap/(ap+bp)*100:50)}%"></i><i class="ib" style="width:${(ap+bp?bp/(ap+bp)*100:50)}%"></i></div>`;})()}
    </div>
    <div style="max-width:680px;margin:0 auto">
      <table><thead><tr><th>Ortak Rakip</th><th style="text-align:center">${an}</th><th style="text-align:center">${bn}</th><th style="text-align:center">Üstün</th></tr></thead>
      <tbody>${rows}</tbody></table>
    </div>`;
}

// ---------- search ----------
let st;
$('#q').addEventListener('input',e=>{clearTimeout(st);const v=e.target.value.trim();
  if(v.length<2){$('#sr').classList.remove('show');return;}
  st=setTimeout(async()=>{const d=await api('/search'+qs({q:v}));
    let h='';
    if(d.players.length){h+='<div class="cat">Oyuncular</div>'+d.players.map(p=>`<div class="r" onclick="go('#/player/${p.player_id}')"><span>${esc(p.name)}</span><span class="muted">${p.age_group?p.age_group+'Y ':''}${Math.round(p.rating)}</span></div>`).join('');}
    if(d.clubs.length){h+='<div class="cat">Kulüpler</div>'+d.clubs.map(c=>`<div class="r" onclick="go('#/rankings?club_id=${c.club_id}')"><span>${esc(c.name)}</span><span class="muted">${esc(c.city||'')}</span></div>`).join('');}
    $('#sr').innerHTML=h||'<div class="r muted">sonuç yok</div>';$('#sr').classList.add('show');},200);});
document.addEventListener('click',e=>{if(!e.target.closest('.search'))$('#sr').classList.remove('show');});
window.go=h=>{$('#q').value='';$('#sr').classList.remove('show');location.hash=h;};

// ---------- router ----------
function qs(o){const p=Object.entries(o).filter(([,v])=>v!=='').map(([k,v])=>k+'='+encodeURIComponent(v));return p.length?'?'+p.join('&'):'';}
function parseQ(s){const o={};(s||'').split('&').forEach(kv=>{if(!kv)return;const[k,v]=kv.split('=');o[k]=decodeURIComponent(v||'');});return o;}
async function route(){
  setNav();
  const h=location.hash.slice(1)||'/';
  const [path,query]=h.split('?');
  const parts=path.split('/').filter(Boolean);
  try{
    if(path==='/'||path==='') return home();
    if(parts[0]==='rankings'){const q=parseQ(query);return q.club_id?rankingsClub(q.club_id):rankings(q);}
    if(parts[0]==='player') return player(parts[1]);
    if(parts[0]==='h2h') return h2h(parts[1],parts[2]);
    if(parts[0]==='compare') return compare(parseQ(query));
    if(parts[0]==='players') return players_dir(parseQ(query));
    if(parts[0]==='tournaments') return tournaments(parseQ(query));
    if(parts[0]==='tournament') return tournament(parts[1]);
    if(parts[0]==='clubs') return clubs();
    app().innerHTML='<p class="muted">Sayfa yok.</p>';
  }catch(e){app().innerHTML='<p class="muted">Hata: '+esc(e.message)+'</p>';}
}
window.addEventListener('hashchange',route);
window.bootDB().then(route).catch(e=>{app().innerHTML='<p class="muted" style="padding:40px">Veri yüklenemedi: '+esc(e.message)+'</p>';});
</script>
</body>
</html>
